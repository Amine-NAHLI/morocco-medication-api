openapi: 3.0.3
info:
  title: Morocco Medication API
  version: 1.0.0
  description: |
    API REST de consultation publique et d'administration sécurisée du catalogue
    marocain des médicaments. Les opérations portant la mention ADMIN exigent un
    JWT Bearer dont le rôle est ADMIN. Le scheduler CNOPS est interne, activable
    par environnement, et n'expose pas de route HTTP propre.
servers:
  - url: /
    description: Same origin
tags:
  - name: Auth
  - name: Medications
  - name: Manufacturers
  - name: Categories
  - name: Active Ingredients
  - name: Medication Active Ingredients
  - name: Organizations
  - name: Regimes
  - name: Reimbursements
  - name: Medication Prices
  - name: Sources
  - name: Source Resources
  - name: Official Documents
  - name: Sync Jobs
  - name: Import
  - name: Sync
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Access token returned by login or registration.
  parameters:
    id:
      name: id
      in: path
      required: true
      schema: { type: integer, minimum: 1 }
    page:
      name: page
      in: query
      schema: { type: integer, minimum: 1, default: 1 }
    limit:
      name: limit
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 10 }
    search:
      name: search
      in: query
      schema: { type: string, maxLength: 255 }
    sortBy:
      name: sortBy
      in: query
      schema: { type: string }
    order:
      name: order
      in: query
      schema: { type: string, enum: [asc, desc], default: desc }
  responses:
    BadRequest: { description: Validation error, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
    Unauthorized: { description: Authentication required or token invalid, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
    Forbidden: { description: ADMIN role required, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
    NotFound: { description: Resource not found, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
    Conflict: { description: Unique or relationship conflict, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
    TooLarge: { description: Uploaded payload is too large, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
    UnsupportedMediaType: { description: Only a valid XLSX file is accepted, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
    InternalError: { description: Unexpected server error, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
  schemas:
    Error:
      type: object
      required: [status, message]
      properties:
        status: { type: string, enum: [error], example: error }
        message: { type: string, example: Resource not found }
        errors: { type: array, items: { type: object }, nullable: true }
    Success:
      type: object
      required: [status, message, data]
      properties:
        status: { type: string, enum: [success], example: success }
        message: { type: string }
        data: { nullable: true }
        meta:
          type: object
          properties:
            total: { type: integer }
            page: { type: integer }
            limit: { type: integer }
    User:
      type: object
      properties:
        id: { type: integer, example: 1 }
        email: { type: string, format: email, example: admin@example.ma }
        name: { type: string, nullable: true }
        role: { type: string, enum: [ADMIN, USER] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    AuthTokens:
      type: object
      required: [accessToken, refreshToken]
      properties:
        user: { $ref: '#/components/schemas/User' }
        accessToken: { type: string, example: eyJhbGciOiJIUzI1NiJ9... }
        refreshToken: { type: string, example: eyJhbGciOiJIUzI1NiJ9... }
    Manufacturer:
      type: object
      required: [name]
      properties:
        id: { type: integer }
        name: { type: string, maxLength: 255 }
        country: { type: string, nullable: true, maxLength: 255 }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    Category:
      type: object
      required: [name]
      properties:
        id: { type: integer }
        name: { type: string, maxLength: 255 }
        description: { type: string, nullable: true }
    ActiveIngredient:
      type: object
      required: [name]
      properties: { id: { type: integer }, name: { type: string, maxLength: 255 } }
    Source:
      type: object
      required: [code, name]
      properties:
        id: { type: integer }
        code: { type: string, maxLength: 255, example: CNOPS }
        name: { type: string, maxLength: 255 }
        description: { type: string, nullable: true }
        website: { type: string, format: uri, nullable: true }
    SourceResource:
      type: object
      required: [name, sourceId]
      properties:
        id: { type: integer }
        name: { type: string, maxLength: 255 }
        url: { type: string, format: uri, nullable: true }
        fileHash: { type: string, nullable: true }
        publishedAt: { type: string, format: date-time, nullable: true }
        sourceId: { type: integer }
        source: { $ref: '#/components/schemas/Source' }
    OfficialDocument:
      type: object
      required: [title]
      properties:
        id: { type: integer }
        title: { type: string, maxLength: 255 }
        reference: { type: string, nullable: true }
        url: { type: string, format: uri, nullable: true }
        publishedAt: { type: string, format: date-time, nullable: true }
    Organization:
      type: object
      required: [code, name]
      properties:
        id: { type: integer }
        code: { type: string, maxLength: 255, example: CNOPS }
        name: { type: string, maxLength: 255 }
        website: { type: string, format: uri, nullable: true }
        phone: { type: string, nullable: true }
    Regime:
      type: object
      required: [code, name]
      properties: { id: { type: integer }, code: { type: string }, name: { type: string }, description: { type: string, nullable: true } }
    MedicationPrice:
      type: object
      required: [medicationId]
      properties:
        id: { type: integer }
        medicationId: { type: integer }
        publicPrice: { type: number, minimum: 0, nullable: true }
        hospitalPrice: { type: number, minimum: 0, nullable: true }
        effectiveDate: { type: string, format: date-time, nullable: true }
        medication: { $ref: '#/components/schemas/Medication' }
    MedicationIngredient:
      type: object
      required: [medicationId, activeIngredientId]
      properties:
        id: { type: integer }
        medicationId: { type: integer }
        activeIngredientId: { type: integer }
        dosage: { type: string, nullable: true }
        activeIngredient: { $ref: '#/components/schemas/ActiveIngredient' }
    Reimbursement:
      type: object
      required: [medicationId, organizationId]
      properties:
        id: { type: integer }
        medicationId: { type: integer }
        organizationId: { type: integer }
        regimeId: { type: integer, nullable: true }
        documentId: { type: integer, nullable: true }
        reimbursementBase: { type: number, minimum: 0, nullable: true }
        reimbursementRate: { type: number, minimum: 0, maximum: 100, nullable: true }
        referencePrice: { type: number, minimum: 0, nullable: true }
        conditions: { type: string, nullable: true }
        status: { type: string, enum: [ACTIVE, ARCHIVED] }
        medication: { $ref: '#/components/schemas/Medication' }
        organization: { $ref: '#/components/schemas/Organization' }
        regime: { $ref: '#/components/schemas/Regime' }
        document: { $ref: '#/components/schemas/OfficialDocument' }
    Medication:
      type: object
      required: [name]
      properties:
        id: { type: integer }
        code: { type: string, nullable: true, maxLength: 100 }
        name: { type: string, maxLength: 255, example: Paracetamol 500 mg }
        form: { type: string, nullable: true }
        presentation: { type: string, nullable: true }
        dosageUnit: { type: string, nullable: true }
        isGeneric: { type: boolean, default: false }
        status: { type: string, enum: [ACTIVE, ARCHIVED], default: ACTIVE }
        manufacturerId: { type: integer, nullable: true }
        categoryId: { type: integer, nullable: true }
        sourceId: { type: integer, nullable: true }
        manufacturer: { $ref: '#/components/schemas/Manufacturer' }
        category: { $ref: '#/components/schemas/Category' }
        source: { $ref: '#/components/schemas/Source' }
        prices: { type: array, items: { $ref: '#/components/schemas/MedicationPrice' } }
        ingredients: { type: array, items: { $ref: '#/components/schemas/MedicationIngredient' } }
        reimbursements: { type: array, items: { $ref: '#/components/schemas/Reimbursement' } }
    SyncJob:
      type: object
      required: [status, sourceId]
      properties:
        id: { type: integer }
        status: { type: string, example: SYNC_SUCCESS }
        sourceId: { type: integer }
        resourceId: { type: integer, nullable: true }
        recordsRead: { type: integer, minimum: 0 }
        recordsValid: { type: integer, minimum: 0 }
        recordsRejected: { type: integer, minimum: 0 }
        recordsCreated: { type: integer, minimum: 0 }
        recordsUpdated: { type: integer, minimum: 0 }
        recordsDuplicates: { type: integer, minimum: 0 }
        errorsCount: { type: integer, minimum: 0 }
        errorDetails: { type: string, nullable: true }
        startedAt: { type: string, format: date-time }
        completedAt: { type: string, format: date-time, nullable: true }
        source: { $ref: '#/components/schemas/Source' }
        resource: { $ref: '#/components/schemas/SourceResource' }
paths:
  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Public registration; the server always assigns USER
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, required: [email, password], properties: { email: { type: string, format: email, example: user@example.ma }, password: { type: string, minLength: 8, maxLength: 128 }, name: { type: string } } } } }
      responses: { '201': { description: Registered, content: { application/json: { schema: { $ref: '#/components/schemas/Success' } } } }, '400': { $ref: '#/components/responses/BadRequest' }, '409': { $ref: '#/components/responses/Conflict' }, '500': { $ref: '#/components/responses/InternalError' } }
  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Issue access and refresh tokens
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, required: [email, password], properties: { email: { type: string, format: email }, password: { type: string } } } } }
      responses: { '200': { description: Authenticated, content: { application/json: { schema: { $ref: '#/components/schemas/Success' } } } }, '400': { $ref: '#/components/responses/BadRequest' }, '401': { $ref: '#/components/responses/Unauthorized' }, '500': { $ref: '#/components/responses/InternalError' } }
  /api/v1/auth/refresh-token:
    post:
      tags: [Auth]
      summary: Rotate a refresh token
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, required: [refreshToken], properties: { refreshToken: { type: string } } } } }
      responses: { '200': { description: Tokens rotated }, '400': { $ref: '#/components/responses/BadRequest' }, '401': { $ref: '#/components/responses/Unauthorized' }, '500': { $ref: '#/components/responses/InternalError' } }
  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Revoke the caller's refresh token
      security: [{ BearerAuth: [] }]
      responses: { '200': { description: Logged out }, '401': { $ref: '#/components/responses/Unauthorized' }, '500': { $ref: '#/components/responses/InternalError' } }
  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: Current access-token identity
      security: [{ BearerAuth: [] }]
      responses: { '200': { description: Current user }, '401': { $ref: '#/components/responses/Unauthorized' }, '500': { $ref: '#/components/responses/InternalError' } }
  /api/v1/auth/users/{id}/role:
    patch:
      tags: [Auth]
      summary: Change a user role (ADMIN)
      x-required-role: ADMIN
      security: [{ BearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/id' }]
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, required: [role], properties: { role: { type: string, enum: [ADMIN, USER] } } } } }
      responses: { '200': { description: Role updated }, '400': { $ref: '#/components/responses/BadRequest' }, '401': { $ref: '#/components/responses/Unauthorized' }, '403': { $ref: '#/components/responses/Forbidden' }, '404': { $ref: '#/components/responses/NotFound' }, '500': { $ref: '#/components/responses/InternalError' } }
  /api/v1/medications:
    get:
      tags: [Medications]
      summary: Public enriched medication list
      parameters:
        - { $ref: '#/components/parameters/page' }
        - { $ref: '#/components/parameters/limit' }
        - { $ref: '#/components/parameters/search' }
        - { $ref: '#/components/parameters/sortBy' }
        - { $ref: '#/components/parameters/order' }
        - { name: status, in: query, schema: { type: string, enum: [ACTIVE, ARCHIVED] } }
        - { name: manufacturerId, in: query, schema: { type: integer, minimum: 1 } }
        - { name: categoryId, in: query, schema: { type: integer, minimum: 1 } }
        - { name: generic, in: query, schema: { type: boolean } }
        - { name: ingredient, in: query, schema: { type: string } }
        - { name: organizationId, in: query, schema: { type: integer, minimum: 1 } }
        - { name: reimbursable, in: query, schema: { type: boolean } }
      responses: { '200': { description: Enriched medications and pagination metadata }, '400': { $ref: '#/components/responses/BadRequest' }, '500': { $ref: '#/components/responses/InternalError' } }
    post:
      tags: [Medications]
      summary: Create medication (ADMIN)
      x-required-role: ADMIN
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/Medication' } } }
      responses: { '201': { description: Created }, '400': { $ref: '#/components/responses/BadRequest' }, '401': { $ref: '#/components/responses/Unauthorized' }, '403': { $ref: '#/components/responses/Forbidden' }, '409': { $ref: '#/components/responses/Conflict' }, '500': { $ref: '#/components/responses/InternalError' } }
  /api/v1/medications/{id}:
    get:
      tags: [Medications]
      summary: Public enriched medication detail
      parameters: [{ $ref: '#/components/parameters/id' }]
      responses: { '200': { description: Medication with manufacturer, category, source, prices, ingredients and reimbursements }, '404': { $ref: '#/components/responses/NotFound' }, '500': { $ref: '#/components/responses/InternalError' } }
    put:
      tags: [Medications]
      summary: Replace medication fields (ADMIN)
      x-required-role: ADMIN
      security: [{ BearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/id' }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/Medication' } } } }
      responses: { '200': { description: Updated }, '400': { $ref: '#/components/responses/BadRequest' }, '401': { $ref: '#/components/responses/Unauthorized' }, '403': { $ref: '#/components/responses/Forbidden' }, '404': { $ref: '#/components/responses/NotFound' }, '409': { $ref: '#/components/responses/Conflict' }, '500': { $ref: '#/components/responses/InternalError' } }
    delete:
      tags: [Medications]
      summary: Delete medication (ADMIN)
      x-required-role: ADMIN
      security: [{ BearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/id' }]
      responses: { '204': { description: Deleted }, '401': { $ref: '#/components/responses/Unauthorized' }, '403': { $ref: '#/components/responses/Forbidden' }, '404': { $ref: '#/components/responses/NotFound' }, '409': { $ref: '#/components/responses/Conflict' }, '500': { $ref: '#/components/responses/InternalError' } }
  /api/v1/medication-ingredients:
    get:
      tags: [Medication Active Ingredients]
      summary: Public medication/active-ingredient links
      parameters: [{ $ref: '#/components/parameters/page' }, { $ref: '#/components/parameters/limit' }, { $ref: '#/components/parameters/sortBy' }, { $ref: '#/components/parameters/order' }]
      responses: { '200': { description: Links }, '500': { $ref: '#/components/responses/InternalError' } }
    post:
      tags: [Medication Active Ingredients]
      summary: Create link (ADMIN)
      x-required-role: ADMIN
      security: [{ BearerAuth: [] }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/MedicationIngredient' } } } }
      responses: { '201': { description: Created }, '400': { $ref: '#/components/responses/BadRequest' }, '401': { $ref: '#/components/responses/Unauthorized' }, '403': { $ref: '#/components/responses/Forbidden' }, '409': { $ref: '#/components/responses/Conflict' }, '500': { $ref: '#/components/responses/InternalError' } }
  /api/v1/medication-ingredients/{id}:
    get:
      tags: [Medication Active Ingredients]
      parameters: [{ $ref: '#/components/parameters/id' }]
      responses: { '200': { description: Link }, '404': { $ref: '#/components/responses/NotFound' }, '500': { $ref: '#/components/responses/InternalError' } }
    put:
      tags: [Medication Active Ingredients]
      summary: Update link (ADMIN)
      x-required-role: ADMIN
      security: [{ BearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/id' }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/MedicationIngredient' } } } }
      responses: { '200': { description: Updated }, '400': { $ref: '#/components/responses/BadRequest' }, '401': { $ref: '#/components/responses/Unauthorized' }, '403': { $ref: '#/components/responses/Forbidden' }, '404': { $ref: '#/components/responses/NotFound' }, '409': { $ref: '#/components/responses/Conflict' }, '500': { $ref: '#/components/responses/InternalError' } }
    delete:
      tags: [Medication Active Ingredients]
      summary: Delete link (ADMIN)
      x-required-role: ADMIN
      security: [{ BearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/id' }]
      responses: { '204': { description: Deleted }, '401': { $ref: '#/components/responses/Unauthorized' }, '403': { $ref: '#/components/responses/Forbidden' }, '404': { $ref: '#/components/responses/NotFound' }, '500': { $ref: '#/components/responses/InternalError' } }
  /api/v1/manufacturers: &manufacturerCollection
    get: { tags: [Manufacturers], summary: Public manufacturer list, parameters: [{ $ref: '#/components/parameters/page' }, { $ref: '#/components/parameters/limit' }, { $ref: '#/components/parameters/search' }, { $ref: '#/components/parameters/sortBy' }, { $ref: '#/components/parameters/order' }], responses: { '200': { description: Manufacturers and pagination metadata }, '400': { $ref: '#/components/responses/BadRequest' }, '500': { $ref: '#/components/responses/InternalError' } } }
    post: { tags: [Manufacturers], summary: Create manufacturer (ADMIN), x-required-role: ADMIN, security: [{ BearerAuth: [] }], requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/Manufacturer' } } } }, responses: { '201': { description: Created }, '400': { $ref: '#/components/responses/BadRequest' }, '401': { $ref: '#/components/responses/Unauthorized' }, '403': { $ref: '#/components/responses/Forbidden' }, '409': { $ref: '#/components/responses/Conflict' }, '500': { $ref: '#/components/responses/InternalError' } } }
  /api/v1/manufacturers/{id}: &manufacturerItem
    get: { tags: [Manufacturers], parameters: [{ $ref: '#/components/parameters/id' }], responses: { '200': { description: Manufacturer }, '404': { $ref: '#/components/responses/NotFound' }, '500': { $ref: '#/components/responses/InternalError' } } }
    patch: { tags: [Manufacturers], summary: Update manufacturer (ADMIN), x-required-role: ADMIN, security: [{ BearerAuth: [] }], parameters: [{ $ref: '#/components/parameters/id' }], requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/Manufacturer' } } } }, responses: { '200': { description: Updated }, '400': { $ref: '#/components/responses/BadRequest' }, '401': { $ref: '#/components/responses/Unauthorized' }, '403': { $ref: '#/components/responses/Forbidden' }, '404': { $ref: '#/components/responses/NotFound' }, '409': { $ref: '#/components/responses/Conflict' }, '500': { $ref: '#/components/responses/InternalError' } } }
    put: { tags: [Manufacturers], summary: Replace manufacturer (ADMIN), x-required-role: ADMIN, security: [{ BearerAuth: [] }], parameters: [{ $ref: '#/components/parameters/id' }], requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/Manufacturer' } } } }, responses: { '200': { description: Updated }, '400': { $ref: '#/components/responses/BadRequest' }, '401': { $ref: '#/components/responses/Unauthorized' }, '403': { $ref: '#/components/responses/Forbidden' }, '404': { $ref: '#/components/responses/NotFound' }, '409': { $ref: '#/components/responses/Conflict' }, '500': { $ref: '#/components/responses/InternalError' } } }
    delete: { tags: [Manufacturers], summary: Delete manufacturer (ADMIN), x-required-role: ADMIN, security: [{ BearerAuth: [] }], parameters: [{ $ref: '#/components/parameters/id' }], responses: { '204': { description: Deleted }, '401': { $ref: '#/components/responses/Unauthorized' }, '403': { $ref: '#/components/responses/Forbidden' }, '404': { $ref: '#/components/responses/NotFound' }, '409': { $ref: '#/components/responses/Conflict' }, '500': { $ref: '#/components/responses/InternalError' } } }
  /api/v1/categories: &categoryCollection
    get: { tags: [Categories], summary: Public category list, parameters: [{ $ref: '#/components/parameters/page' }, { $ref: '#/components/parameters/limit' }, { $ref: '#/components/parameters/search' }, { $ref: '#/components/parameters/sortBy' }, { $ref: '#/components/parameters/order' }], responses: { '200': { description: Categories and pagination metadata }, '400': { $ref: '#/components/responses/BadRequest' }, '500': { $ref: '#/components/responses/InternalError' } } }
    post: { tags: [Categories], summary: Create category (ADMIN), x-required-role: ADMIN, security: [{ BearerAuth: [] }], requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/Category' } } } }, responses: { '201': { description: Created }, '400': { $ref: '#/components/responses/BadRequest' }, '401': { $ref: '#/components/responses/Unauthorized' }, '403': { $ref: '#/components/responses/Forbidden' }, '409': { $ref: '#/components/responses/Conflict' }, '500': { $ref: '#/components/responses/InternalError' } } }
  /api/v1/categories/{id}: &categoryItem
    get: { tags: [Categories], parameters: [{ $ref: '#/components/parameters/id' }], responses: { '200': { description: Category }, '404': { $ref: '#/components/responses/NotFound' }, '500': { $ref: '#/components/responses/InternalError' } } }
